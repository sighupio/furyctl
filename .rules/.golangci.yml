version: "2"
run:
  concurrency: 2
  go: 1.25.12
  modules-download-mode: readonly

linters:
  default: all
  disable:
    - depguard
    - exhaustruct
    - forbidigo
    - ireturn
    - maintidx
    - nlreturn # too strict and mostly code is not more readable
    - noinlineerr
    - rowserrcheck
    - sqlclosecheck
    - varnamelen
    - wastedassign
    - wsl # deprecated, replaced by wsl_v5 since golangci-lint v2.2.0
    - wsl_v5 # too strict and mostly code is not more readable
  settings:
    cyclop:
      max-complexity: 80
    decorder:
      disable-init-func-first-check: false
    errcheck:
      disable-default-exclusions: false
      check-type-assertions: true
      check-blank: true
    errchkjson:
      check-error-free-encoding: false
      report-no-exported: true
    errorlint:
      errorf: false
      errorf-multi: true
      asserts: true
      comparison: true
    exhaustive:
      default-signifies-exhaustive: true
      check:
        - switch
        - map
    funlen:
      lines: 400
      statements: 182
    gocognit:
      min-complexity: 210
    godot:
      scope: all
      exclude:
        - '^fixme:'
        - '^todo:'
      capital: true
      period: true
    gomoddirectives:
      # we need to use replace to be able to use Internal Kubernetes libraries
      # needed for the create PKI feature.
      replace-allow-list:
        - k8s.io/api
        - k8s.io/apiextensions-apiserver
        - k8s.io/apimachinery
        - k8s.io/apiserver
        - k8s.io/cli-runtime
        - k8s.io/client-go
        - k8s.io/cloud-provider
        - k8s.io/cluster-bootstrap
        - k8s.io/code-generator
        - k8s.io/component-base
        - k8s.io/component-helpers
        - k8s.io/controller-manager
        - k8s.io/cri-api
        - k8s.io/csi-translation-lib
        - k8s.io/dynamic-resource-allocation
        - k8s.io/endpointslice
        - k8s.io/kms
        - k8s.io/kube-aggregator
        - k8s.io/kube-controller-manager
        - k8s.io/kube-proxy
        - k8s.io/kube-scheduler
        - k8s.io/kubectl
        - k8s.io/kubelet
        - k8s.io/legacy-cloud-providers
        - k8s.io/metrics
        - k8s.io/mount-utils
        - k8s.io/pod-security-admission
        - k8s.io/sample-apiserver
        - k8s.io/sample-cli-plugin
        - k8s.io/sample-controller
    godoclint:
      default: basic
      enable:
        - no-unused-link
        - require-stdlib-doclink
    gosec:
      excludes:
        - G204
        - G101
    grouper:
      const-require-single-const: true
      const-require-grouping: false
      import-require-single-import: true
      import-require-grouping: false
      var-require-single-var: true
      var-require-grouping: false
    nestif:
      min-complexity: 60
    nolintlint:
      require-explanation: true
      require-specific: true
    revive:
      enable-all-rules: true
      rules:
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#add-constant
        - name: add-constant
          arguments:
            - allowFloats: 0.0,0.,1.0,1.,2.0,2.
              allowInts: 0,1,2
              allowStrs: '""'
              maxLitCount: "15"
          severity: warning
          disabled: false
        - name: argument-limit
          arguments:
            - 10
          severity: warning
          disabled: false
        - name: atomic
          severity: warning
          disabled: false
        - name: banned-characters
          arguments:
            - Ω
            - Σ
            - σ
            - "7"
          severity: warning
          disabled: false
        - name: bare-return
          severity: warning
          disabled: false
        - name: blank-imports
          severity: warning
          disabled: true
        - name: bool-literal-in-expr
          severity: warning
          disabled: false
        - name: call-to-gc
          severity: warning
          disabled: false
        - name: cognitive-complexity
          arguments:
            - 210
          severity: warning
          disabled: false
        - name: comment-spacings
          arguments:
            - nolint
          severity: warning
          disabled: false
        - name: confusing-naming
          severity: warning
          disabled: false
        - name: confusing-results
          severity: warning
          disabled: true
        - name: constant-logical-expr
          severity: warning
          disabled: false
        - name: context-as-argument
          severity: warning
          disabled: false
        - name: context-keys-type
          severity: warning
          disabled: false
        - name: cyclomatic
          arguments:
            - 80
          severity: warning
          disabled: false
        - name: datarace
          severity: warning
          disabled: false
        - name: deep-exit
          severity: warning
          disabled: false
        - name: defer
          arguments:
            - - call-chain
              - loop
          severity: warning
          disabled: false
        - name: dot-imports
          severity: warning
          disabled: false
        - name: duplicated-imports
          severity: warning
          disabled: false
        - name: early-return
          severity: warning
          disabled: false
        - name: empty-block
          severity: warning
          disabled: false
        - name: empty-lines
          severity: warning
          disabled: false
        - name: error-naming
          severity: warning
          disabled: false
        - name: error-return
          severity: warning
          disabled: false
        - name: error-strings
          severity: warning
          disabled: false
        - name: errorf
          severity: warning
          disabled: false
        - name: exported
          arguments:
            - checkPrivateReceivers
            - sayRepetitiveInsteadOfStutters
          severity: warning
          disabled: false
        - name: file-header
          arguments:
            - This is the text that must appear at the top of source files.
          severity: warning
          disabled: true
        - name: flag-parameter
          severity: warning
          disabled: false
        - name: function-result-limit
          arguments:
            - 4
          severity: warning
          disabled: false
        - name: function-length
          arguments:
            - 200
            - 0
          severity: warning
          disabled: false
        - name: get-return
          severity: warning
          disabled: false
        - name: identical-branches
          severity: warning
          disabled: false
        - name: if-return
          severity: warning
          disabled: false
        - name: increment-decrement
          severity: warning
          disabled: false
        - name: indent-error-flow
          severity: warning
          disabled: false
        - name: imports-blocklist
          arguments:
            - crypto/md5
            - crypto/sha1
          severity: warning
          disabled: false
        - name: import-shadowing
          severity: warning
          disabled: false
        - name: line-length-limit
          arguments:
            - 140
          severity: warning
          disabled: true
        - name: max-public-structs
          arguments:
            - 10
          severity: warning
          disabled: false
        - name: modifies-parameter
          severity: warning
          disabled: false
        - name: modifies-value-receiver
          severity: warning
          disabled: false
        - name: nested-structs
          severity: warning
          disabled: false
        - name: optimize-operands-order
          severity: warning
          disabled: false
        - name: package-comments
          severity: warning
          disabled: false
          # Disabled because we intentionally use mismatched names in two cases:
          #   - `delete` directories use `package del` (delete is a Go builtin).
          #   - `internal/x/*` and `pkg/x/*` packages use the `x` suffix convention
          #     (e.g. `execx`, `iox`, `netx`) to avoid shadowing stdlib package names.
        - name: package-directory-mismatch
          severity: warning
          disabled: true
        - name: range
          severity: warning
          disabled: false
        - name: range-val-in-closure
          severity: warning
          disabled: false
        - name: range-val-address
          severity: warning
          disabled: false
        - name: receiver-naming
          severity: warning
          disabled: false
        - name: redefines-builtin-id
          severity: warning
          disabled: false
        - name: string-of-int
          severity: warning
          disabled: false
        - name: string-format
          arguments:
            - - core.WriteError[1].Message
              - /^([^A-Z]|$)/
              - must not start with a capital letter
            - - fmt.Errorf[0]
              - /(^|[^\.!?])$/
              - must not end in punctuation
            - - panic
              - /^[^\n]*$/
              - must not contain line breaks
          severity: warning
          disabled: false
        - name: struct-tag
          arguments:
            - "validate,api-version,cluster-kind,eks-version,permissive-semver,permissive-constraint,aws-region"
          severity: warning
          disabled: false
        - name: superfluous-else
          severity: warning
          disabled: false
        - name: time-equal
          severity: warning
          disabled: false
        - name: time-naming
          severity: warning
          disabled: false
        - name: var-naming
          arguments:
            - - ID
            - - VM
          severity: warning
          disabled: false
        - name: var-declaration
          severity: warning
          disabled: false
        - name: unconditional-recursion
          severity: warning
          disabled: false
        - name: unexported-naming
          severity: warning
          disabled: false
        - name: unexported-return
          severity: warning
          disabled: false
        - name: unhandled-error
          arguments:
            - fmt.Printf
            - fmt.Fprintf
            - strings.Builder.WriteString
          severity: warning
          disabled: false
        - name: unnecessary-stmt
          severity: warning
          disabled: false
        - name: unreachable-code
          severity: warning
          disabled: false
        - name: unused-parameter
          severity: warning
          disabled: false
        - name: unused-receiver
          severity: warning
          disabled: false
        - name: useless-break
          severity: warning
          disabled: false
        - name: waitgroup-by-value
          severity: warning
          disabled: false
    varnamelen:
      check-receiver: true
      check-return: true
      check-type-param: false
      ignore-names:
        - err
      ignore-type-assert-ok: true
      ignore-map-index-ok: true
      ignore-chan-recv-ok: true
      ignore-decls:
        - c echo.Context
        - t testing.T
        - e error
        - i int
        - const C
        - T any
        - m map[string]int
  exclusions:
    generated: disable
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - cyclop
          - dupl
          - err113
          - errcheck
          - forcetypeassert
          - funlen
          - gochecknoglobals
          - goconst
          - gocyclo
          - gosec
          - lll
          - maintidx
          - revive
      - path: main\.go
        linters:
          - gochecknoglobals
      - path: cmd
        linters:
          - lll
      - path: internal/apis/kfd/v1alpha2/.*/(public|private)/schema\.go
        linters:
          - godot
          - lll
          - revive
          - staticcheck
          - tagalign
          - tagliatelle
      - path: internal/apis/config/
        linters:
          - exptostd
          - gochecknoglobals
          - godot
          - revive
          - staticcheck
          - tagalign
          - tagliatelle

    paths:
      - .*\.gen\.go$
      - file_getter.go
issues:
  max-issues-per-linter: 50
  max-same-issues: 3
  new: false
  fix: false
severity:
  default: error
  rules:
    - linters:
        - dupl
      severity: info
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/sighupio)
      custom-order: true
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/sighupio
  exclusions:
    generated: disable
    paths:
      - .*\.gen\.go$
      - file_getter.go
